{{ define "main" }}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <h1>{{ .Title }}</h1>
            <div class="post-list">
                {{ range .Paginator.Pages }}
                    {{ partial "post-list-item.html" . }}
                {{ end }}
            </div>
            {{ partial "pagination.html" . }}
        </div>
    </div>
</div>
{{ end }}
